name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/web-ui/**'
      - 'packages/core/**'
      - 'packages/transformer/**'
      - 'packages/engine/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if [ "$ACT" = "true" ]; then
            # 本地测试环境：不检查 lockfile
            pnpm install --no-frozen-lockfile
          else
            # CI 环境：严格检查 lockfile
            pnpm install --frozen-lockfile
          fi
        env:
          ACT: ${{ secrets.ACT }}

      - name: Build packages
        run: pnpm build

      - name: Build Web UI
        run: pnpm --filter @content-hub/web-ui build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: ${{ env.ACT != 'true' }}  # 跳过本地测试

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ env.ACT != 'true' }}  # 跳过本地测试
        with:
          path: ./packages/web-ui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: ${{ env.ACT != 'true' }}  # 跳过本地测试
